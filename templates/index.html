<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delivery Game</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <div class="container">

    <header class="app-header">
      <h1>🚚 Delivery Game</h1>
      <p id="header-subtitle" class="subtitle">Choose a game mode to begin</p>
      <p id="survival-stats" class="survival-stats hidden" aria-live="polite">
        <span id="hp-display">HP: 100</span>
        <span class="survival-stats__sep">·</span>
        <span id="level-display">Level: 1</span>
      </p>
    </header>

    <!-- ── Game Lobby ────────────────────────────────────────────── -->
    <section id="lobby-section" class="lobby-section" aria-label="Game lobby">
      <div id="menu-main" class="menu-panel">
        <h2 class="menu-title">Select Game Mode</h2>
        <button id="btn-parallel-mode" type="button" class="menu-btn menu-btn--parallel">
          Parallel Mode
        </button>
        <button id="btn-linear-mode" type="button" class="menu-btn menu-btn--linear">
          Linear Mode
        </button>
      </div>

      <div id="menu-sub" class="menu-panel hidden">
        <h2 id="menu-sub-title" class="menu-title">Choose Setup</h2>
        <button id="btn-practice" type="button" class="menu-btn menu-btn--practice">
          Practice Mode (Custom Location)
        </button>
        <button id="btn-random" type="button" class="menu-btn menu-btn--random">
          Endless Survival Mode
        </button>
        <button id="btn-back-menu" type="button" class="menu-btn menu-btn--back">
          ← Back
        </button>
      </div>
    </section>

    <!-- ── Search Panel (Practice only) ──────────────────────────── -->
    <section id="search-section" class="search-panel hidden" aria-label="Location search">
      <div class="search-row">
        <input
          id="search-input"
          type="text"
          placeholder="Search for a location…"
          autocomplete="off"
          aria-label="Location search query"
        />
        <button id="search-btn" type="button" aria-label="Search">
          Search
        </button>
      </div>
      <p id="search-status" class="status-msg" aria-live="polite"></p>
    </section>

    <!-- ── Results List (Practice search) ───────────────────────── -->
    <section id="results-panel" class="results-panel hidden" aria-label="Search results">
      <ul id="results-list" class="results-list" role="list"></ul>
    </section>

    <!-- ── Selected Location Display ─────────────────────────────── -->
    <section id="selected-panel" class="selected-panel hidden" aria-label="Selected location">
      <h2>Start Point</h2>
      <p id="selected-name" class="selected-name"></p>
      <p id="selected-coords" class="selected-coords"></p>
    </section>

    <!-- ── Leaflet Map ───────────────────────────────────────────── -->
    <section id="map-section" class="map-section hidden" aria-label="Delivery map">
      <div class="map-toolbar">
        <div class="map-hud">
          <p id="game-stage-label" class="game-stage-label"></p>
          <p id="game-time-label" class="game-time-label"></p>
          <p id="score-panel" class="score-panel hidden" aria-live="polite"></p>
        </div>
        <div class="map-actions">
          <button id="undo-btn" type="button" class="hidden" disabled>
            Undo Last Step
          </button>
          <button id="evaluate-btn" type="button" class="hidden" disabled>
            Evaluate Route
          </button>
          <button id="next-level-btn" type="button" class="hidden menu-btn menu-btn--random">
            Next Level
          </button>
        </div>
      </div>
      <div id="map" role="application" aria-label="Map of delivery POIs"></div>
    </section>

    <!-- ── Game Over (Survival) ──────────────────────────────────── -->
    <section id="game-over-panel" class="lobby-section hidden" aria-label="Game over">
      <h2 class="menu-title">Game Over</h2>
      <p id="game-over-message" class="game-time-label">
        Your HP reached 0. Better luck next run!
      </p>
      <button id="restart-game-btn" type="button" class="menu-btn menu-btn--practice">
        Restart Game
      </button>
    </section>

  </div>

  <style>
    .survival-stats {
      margin-top: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #f59e0b;
    }
    .survival-stats__sep { margin: 0 0.35rem; opacity: 0.7; }
    #hp-display.low-hp { color: #ef4444; }
    #next-level-btn { font-size: 0.85rem; padding: 0.55rem 1rem; }
    #game-over-panel { text-align: center; }
    #game-over-panel .game-time-label { margin: 0.75rem 0 1rem; }
  </style>

  <script>
    const API_BASE = "";
  </script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="/static/js/game.js"></script>

</body>
</html>
